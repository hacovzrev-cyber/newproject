<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LCONRAD ADMIN PANEL</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
background:#f1f4f9;
color:#333;
}

/* SIDEBAR */

.sidebar{
width:230px;
height:100vh;
background:#0f172a;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
font-size:20px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
border-radius:6px;
margin-bottom:5px;
}

.sidebar a:hover{
background:#1e293b;
}

/* MAIN */

.main{
flex:1;
padding:25px;
}

/* CARDS */

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
margin-bottom:20px;
}

/* INPUTS */

input{
padding:10px;
margin:5px 0;
width:100%;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 15px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

button:hover{
background:#1d4ed8;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

/* DARK MODE */

.dark{
background:#0f172a;
color:white;
}

.dark .card{
background:#1e293b;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>LCONRAD ADMIN</h2>

<a href="#">Dashboard</a>
<a href="#">Services</a>
<a href="#">Add Funds</a>
<a href="#">Users</a>
<a href="#">Theme</a>

</div>

<div class="main">

<div class="card">

<h3>Dashboard</h3>
<p>Manage your boosting site here.</p>

<button onclick="toggleTheme()">Toggle Dark / Light Theme</button>

</div>


<div class="card">

<h3>Services</h3>

<input id="serviceName" placeholder="Service Name">
<input id="servicePrice" placeholder="Price">

<button onclick="addService()">Add Service</button>

<table>

<thead>
<tr>
<th>Service</th>
<th>Price</th>
</tr>
</thead>

<tbody id="servicesTable"></tbody>

</table>

</div>


<div class="card">

<h3>Add Funds</h3>

<input id="fundUser" placeholder="Username">
<input id="fundAmount" placeholder="Amount">

<button onclick="addFunds()">Add Funds</button>

<table>

<thead>
<tr>
<th>User</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="fundsTable"></tbody>

</table>

</div>


<div class="card">

<h3>Users</h3>

<input id="username" placeholder="Username">
<input id="email" placeholder="Email">

<button onclick="addUser()">Add User</button>

<table>

<thead>
<tr>
<th>Username</th>
<th>Email</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

</div>

<script>

/* THEME */

function toggleTheme(){
document.body.classList.toggle("dark");
}

/* SERVICES */

function addService(){

let name=document.getElementById("serviceName").value;
let price=document.getElementById("servicePrice").value;

let table=document.getElementById("servicesTable");

table.innerHTML+=`
<tr>
<td>${name}</td>
<td>${price}</td>
</tr>
`;

}

/* FUNDS */

function addFunds(){

let user=document.getElementById("fundUser").value;
let amount=document.getElementById("fundAmount").value;

let table=document.getElementById("fundsTable");

table.innerHTML+=`
<tr>
<td>${user}</td>
<td>${amount}</td>
</tr>
`;

}

/* USERS */

function addUser(){

let username=document.getElementById("username").value;
let email=document.getElementById("email").value;

let table=document.getElementById("usersTable");

table.innerHTML+=`
<tr>
<td>${username}</td>
<td>${email}</td>
</tr>
`;

}

</script>

</body>
</html>
```
