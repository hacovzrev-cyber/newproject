<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LCONRAD TRACK</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6fb;
color:#333;
}

header{
background:#0f172a;
color:white;
text-align:center;
padding:25px;
font-size:28px;
font-weight:600;
letter-spacing:2px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:25px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.search-box{
display:flex;
gap:10px;
margin-top:15px;
}

.search-box input{
flex:1;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
}

.search-box button{
padding:12px 18px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

.search-box button:hover{
background:#1d4ed8;
}

.stats{
font-size:18px;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#f1f5f9;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

.status{
padding:6px 12px;
border-radius:20px;
color:white;
font-size:12px;
}

.pending{background:#f59e0b;}
.progress{background:#3b82f6;}
.completed{background:#16a34a;}
.cancelled{background:#ef4444;}

.result{
margin-top:15px;
background:#f8fafc;
padding:15px;
border-radius:8px;
}

.footer{
text-align:center;
margin-top:30px;
font-size:14px;
color:#666;
}

.social-links{
margin-top:10px;
}

.social-links a{
text-decoration:none;
margin:0 8px;
background:#2563eb;
color:white;
padding:8px 15px;
border-radius:20px;
font-size:13px;
}

.social-links a:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<header>
LCONRAD TRACK
</header>

<div class="container">

<div class="card">

<h3>Track Your Order</h3>

<div class="search-box">

<input id="orderInput" placeholder="Enter Order ID (Example: LC1001)">

<button onclick="trackOrder()">Track</button>

</div>

<div id="result"></div>

</div>


<div class="card">

<div class="stats">
Total Orders: <span id="totalOrders"></span>
</div>

<table>

<thead>

<tr>
<th>Order ID</th>
<th>Quantity</th>
<th>Date</th>
<th>Status</th>
</tr>

</thead>

<tbody id="orderTable"></tbody>

</table>

</div>

<div class="footer">

LCONRAD TRACK • Order Tracking System

<div class="social-links">

<a href="https://facebook.com" target="_blank">Facebook</a>

<a href="https://tiktok.com" target="_blank">TikTok</a>

<a href="https://youtube.com" target="_blank">YouTube</a>

<a href="https://instagram.com" target="_blank">Instagram</a>

</div>

</div>

</div>

<script>

const orders=[

{id:"LC1001",qty:2,date:"March 10 2026",status:"Pending"},
{id:"LC1002",qty:5,date:"March 11 2026",status:"In Progress"},
{id:"LC1003",qty:1,date:"March 12 2026",status:"Completed"},
{id:"LC1004",qty:3,date:"March 13 2026",status:"Cancelled"}

];

const table=document.getElementById("orderTable");

orders.forEach(o=>{

let cls="";

if(o.status==="Pending") cls="pending";
if(o.status==="In Progress") cls="progress";
if(o.status==="Completed") cls="completed";
if(o.status==="Cancelled") cls="cancelled";

table.innerHTML+=`

<tr>
<td>${o.id}</td>
<td>${o.qty}</td>
<td>${o.date}</td>
<td><span class="status ${cls}">${o.status}</span></td>
</tr>

`;

});

document.getElementById("totalOrders").innerText=orders.length;

function trackOrder(){

let input=document.getElementById("orderInput").value.toUpperCase();

let result=document.getElementById("result");

let order=orders.find(o=>o.id===input);

if(order){

result.innerHTML=`

<div class="result">

<strong>Order Found</strong><br><br>

Order ID: ${order.id}<br>
Quantity: ${order.qty}<br>
Date: ${order.date}<br>
Status: ${order.status}

</div>

`;

}else{

result.innerHTML=`<div class="result">Order not found.</div>`;

}

}

</script>

</body>
</html>
