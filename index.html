<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCONRAD TRACK</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
margin:0;
padding:0;
}

header{
background:#111;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
width:90%;
max-width:1000px;
margin:auto;
margin-top:30px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 15px;
background:#111;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#333;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

.status{
padding:5px 10px;
border-radius:5px;
color:white;
font-size:12px;
}

.pending{background:orange;}
.progress{background:#3498db;}
.completed{background:green;}
.cancelled{background:red;}

.stats{
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
LCONRAD TRACK
</header>

<div class="container">

<div class="card">
<h3>Track Your Order</h3>

<input type="text" id="trackInput" placeholder="Enter Order ID">

<button onclick="trackOrder()">Track Order</button>

<p id="result"></p>

</div>


<div class="card">

<div class="stats">
Total Orders: <span id="totalOrders">4</span>
</div>

<table>

<thead>
<tr>
<th>Order ID</th>
<th>Quantity</th>
<th>Date</th>
<th>Status</th>
</tr>
</thead>

<tbody id="orderTable">

<tr>
<td>LC1001</td>
<td>2</td>
<td>June 1 2026</td>
<td><span class="status pending">Pending</span></td>
</tr>

<tr>
<td>LC1002</td>
<td>5</td>
<td>June 3 2026</td>
<td><span class="status progress">In Progress</span></td>
</tr>

<tr>
<td>LC1003</td>
<td>1</td>
<td>June 5 2026</td>
<td><span class="status completed">Completed</span></td>
</tr>

<tr>
<td>LC1004</td>
<td>3</td>
<td>June 6 2026</td>
<td><span class="status cancelled">Cancelled</span></td>
</tr>

</tbody>

</table>

</div>

</div>

<script>

function trackOrder(){

let input = document.getElementById("trackInput").value.toUpperCase();

let table = document.getElementById("orderTable").rows;

let found = false;

for(let i=0;i<table.length;i++){

let orderID = table[i].cells[0].innerText;

if(orderID === input){

let qty = table[i].cells[1].innerText;
let date = table[i].cells[2].innerText;
let status = table[i].cells[3].innerText;

document.getElementById("result").innerHTML =
"<b>Order Found</b><br>Quantity: "+qty+
"<br>Date: "+date+
"<br>Status: "+status;

found = true;

}

}

if(!found){

document.getElementById("result").innerHTML = "Order ID not found.";

}

}

</script>

</body>
</html>
